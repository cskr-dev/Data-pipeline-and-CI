name: Data Pipeline CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout repository (updated version)
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️⃣ Setup Python (updated version)
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # 3️⃣ Cache dependencies (faster builds)
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 4️⃣ Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 5️⃣ Set PYTHONPATH (fix import issues)
    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=." >> $GITHUB_ENV

    # 6️⃣ Lint check (non-blocking)
    - name: Lint (flake8)
      run: |
        pip install flake8
        flake8 . --max-line-length=120 || true

    # 7️⃣ Run tests
    - name: Run tests
      run: |
        pip install pytest
        pytest

    # 8️⃣ Run pipeline script (integration test)
    - name: Run pipeline
      run: python pipeline/main.py

    # 9️⃣ Validate output file
    - name: Validate output
      run: |
        if [ ! -f data/output.csv ]; then
          echo "Output file not found!"
          exit 1
        fi